services:
  # Spring Boot Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coldmailer-backend
    environment:
      # Spring Profile
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      
      # MongoDB Configuration (External)
      SPRING_DATA_MONGODB_URI: ${SPRING_DATA_MONGODB_URI:-mongodb://your-external-mongodb-uri}
      SPRING_DATA_MONGODB_DATABASE: ${SPRING_DATA_MONGODB_DATABASE:-coldmailer}
      SPRING_DATA_MONGODB_AUTO_INDEX_CREATION: 'true'
      
      # Server Configuration
      SERVER_PORT: ${SERVER_PORT:-8080}
      
      # JWT Security
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-at-least-32-characters-long}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      
      # CORS Configuration
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      
      # Logging
      LOGGING_LEVEL_ROOT: ${LOGGING_LEVEL_ROOT:-INFO}
      LOGGING_LEVEL_COM_SMARTCOLDMAILER: ${LOGGING_LEVEL_COM_SMARTCOLDMAILER:-DEBUG}
      LOGGING_LEVEL_SPRING_DATA_MONGODB: ${LOGGING_LEVEL_SPRING_DATA_MONGODB:-DEBUG}
      
      # Email/SMTP Configuration
      MAIL_SMTP_HOST: ${MAIL_SMTP_HOST:-smtp.gmail.com}
      MAIL_SMTP_PORT: ${MAIL_SMTP_PORT:-587}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_SMTP_STARTTLS_ENABLE: ${MAIL_SMTP_STARTTLS_ENABLE:-true}
      MAIL_FROM: ${MAIL_FROM:-your-email@gmail.com}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Smart Cold Mailer}
      
      # Application Features
      BULK_EMAIL_BATCH_SIZE: ${BULK_EMAIL_BATCH_SIZE:-10}
      EMAIL_DELAY_SECONDS: ${EMAIL_DELAY_SECONDS:-5}
      MAX_EMAILS_PER_DAY: ${MAX_EMAILS_PER_DAY:-100}
      
      # Security & Encryption
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-MTIzNDU2Nzg5MDEyMzQ1Ng==}
      ENCRYPTION_ALGORITHM: ${ENCRYPTION_ALGORITHM:-AES}
    
    ports:
      - "${SERVER_PORT:-8080}:8080"
    
    volumes:
      - ./logs:/app/logs
    
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${SERVER_PORT:-8080}/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    
    restart: unless-stopped
    
    networks:
      - coldmailer-network

networks:
  coldmailer-network:
    driver: bridge
